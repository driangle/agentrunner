name: Publish Go Module

on:
  push:
    tags:
      - "agentrunner/v*"

jobs:
  validate:
    name: Validate Go Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run checks
        run: make check-go

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#agentrunner/}" >> "$GITHUB_OUTPUT"

      - name: Verify module is fetchable
        run: GOPROXY=https://proxy.golang.org go list -m "github.com/driangle/agent-runner/agentrunner@${{ steps.version.outputs.version }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Go ${{ github.ref_name }}"
          generate_release_notes: true
